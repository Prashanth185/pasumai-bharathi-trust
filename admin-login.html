<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Pasumai Bharathi Trust</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #eef6eb;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 50px;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 580px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 35px;
        }
        .logo-container img {
            height: 180px;
            width: auto;
            display: block;
            margin: 0 auto;
        }
        .branding-text {
            color: #1b5e20;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
            margin-top: 20px;
        }
        .login-card h2 {
            color: #2e7d32;
            margin: 0 0 32px 0;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .login-card input {
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #f9f9f9;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .login-card input:focus {
            outline: none;
            background: #f5f5f5;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        .login-card button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.25);
            margin-top: 8px;
        }
        .login-card button:hover {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(46, 125, 50, 0.35);
        }
        #error-msg {
            color: #d32f2f;
            margin-bottom: 24px;
            display: none;
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
            background: #ffebee;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 45px 35px;
                max-width: 500px;
            }
            .logo-container img {
                height: 140px;
            }
            .login-card h2 {
                font-size: 28px;
                margin-bottom: 28px;
            }
            .branding-text {
                font-size: 16px;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            .login-card {
                padding: 35px 25px;
                border-radius: 20px;
            }
            .logo-container img {
                height: 110px;
            }
            .login-card h2 {
                font-size: 24px;
                margin-bottom: 24px;
            }
            .branding-text {
                font-size: 14px;
            }
            .login-card input {
                padding: 16px 18px;
                margin-bottom: 18px;
                font-size: 15px;
            }
            .login-card button {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="../images/logo.jpeg" alt="Pasumai Bharathi Trust Logo">
        </div>
        <div class="branding-text">PASUMAI BHARATHI TRUST</div>
        <h2>Admin Portal</h2>
        <div id="error-msg">Invalid credentials</div>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = '/admin/dashboard';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
